<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>OpsAware — Login</title>
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link rel="stylesheet" href="https://fonts.googleapis.com/css2?family=Syne:wght@400;500;700;800&family=DM+Sans:wght@300;400;500&display=swap" />
  <link rel="stylesheet" href="style.css" />
</head>
<body>

  <div class="page">
    <div class="card">

      <aside class="side">
        <div class="brand">
          <img src="logorockwell.png" alt="Rockwell Automation" class="brand-logo" />
          <span class="brand-name">OpsAware</span>
        </div>
        <p class="tagline">Operaciones<br><span>bajo</span><br>control.</p>
      </aside>

      <main class="main">
        <div class="header">
          <h1>Iniciar sesión</h1>
          <p>Ingresa tus credenciales para continuar</p>
        </div>

        <div class="field">
          <label for="username">Correo electrónico</label>
          <input type="email" id="username" placeholder="hola@empresa.com" autocomplete="email" />
        </div>

        <div class="field">
          <label for="password">Clave</label>
          <input type="password" id="password" placeholder="••••••••" autocomplete="current-password" />
        </div>

        <div id="msg" class="msg" role="alert" aria-live="polite"></div>

        <button type="button" id="btnLogin" class="btn-primary">Iniciar sesión</button>

        <div class="links">
          <a href="#">¿No tienes cuenta? Registrarse</a>
          <a href="#">¿Olvidaste contraseña?</a>
        </div>
      </main>

    </div>
  </div>

  <script src="script.js"></script>
</body>
</html>
