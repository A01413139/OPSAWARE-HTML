<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8"/>
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>OpsAware — Iniciar Sesión</title>
  <link rel="preconnect" href="https://fonts.googleapis.com"/>
  <link href="https://fonts.googleapis.com/css2?family=VT323&family=Rajdhani:wght@400;500;600;700&display=swap" rel="stylesheet"/>
  <link rel="stylesheet" href="style.css"/>
</head>
<body>

  <div class="page">
    <div class="card">

      <aside class="side">
        <div class="brand">
          <div class="brand-logo-wrap">
            <img src="logorockwell.png" alt="OA" onerror="this.style.display='none'"/>
          </div>
          <span class="brand-name">OPSAWARE</span>
        </div>
        <div class="side-body">
          <p class="tagline"><span>OPS</span>AWARE</p>
          <p class="tagline-sub">WAREHOUSE DEFENSE SYSTEM</p>
          <div class="side-stats">
            <div class="side-stat">
              <div class="ss-val">52</div>
              <div class="ss-lbl">Agentes activos</div>
            </div>
            <div class="side-stat">
              <div class="ss-val">5</div>
              <div class="ss-lbl">Niveles</div>
            </div>
            <div class="side-stat">
              <div class="ss-val">342</div>
              <div class="ss-lbl">Amenazas neutralizadas</div>
            </div>
          </div>
        </div>
      </aside>

      <main class="main">
        <div class="form-tag">// AUTENTICACIÓN</div>
        <div class="  header">
          <h1>Iniciar sesión</h1>
          <p>Ingresa tus credenciales para continuar</p>
        </div>

        <div class="field">
          <label for="username">Correo electrónico</label>
          <input type="email" id="username" placeholder="correo@empresa.com" autocomplete="email"/>
        </div>

        <div class="field">
          <label for="password">Contraseña</label>
          <input type="password" id="password" placeholder="••••••••" autocomplete="current-password"/>
        </div>

        <div id="msg" class="msg" role="alert" aria-live="polite"></div>

        <button type="button" id="btnLogin" class="btn-primary">▶ ACCEDER AL SISTEMA</button>

        <div class="links">
          <a href="registro.html">¿No tienes cuenta? Registrarse</a>
          <a href="home.html">← Inicio</a>
        </div>
      </main>

    </div>
  </div>

  <script src="script.js"></script>
</body>
</html>
