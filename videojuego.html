<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8"/>
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>OpsAware — Videojuego</title>
  <link rel="preconnect" href="https://fonts.googleapis.com"/>
  <link rel="stylesheet" href="https://fonts.googleapis.com/css2?family=Syne:wght@600;700;800&family=DM+Sans:wght@300;400;500&display=swap"/>
  <link rel="stylesheet" href="dashboard.css"/>
</head>
<body>

  <nav class="nav">
    <div class="nav-left">
      <div class="nav-logo">
        <img src="logorockwell.png" alt="Logo" style="width:28px;height:28px;object-fit:contain;">
      </div>
      <span class="nav-title">OpsAware</span>
    </div>

    <div class="nav-right">
      <button class="btn-game" id="btnBack">← Estadísticas</button>

      <div class="nav-user">
        <div class="nav-user-name" id="nombreUsuario">Cargando...</div>
        <div class="nav-user-sub">Admin &nbsp;|&nbsp; Nivel 5 &nbsp;|&nbsp; Xp: 2500</div>
      </div>

      <button class="btn-logout" id="btnLogout">Cerrar sesión</button>
    </div>
  </nav>

  <div class="content">
    <div class="page-title">Simulador de entrenamiento</div>

  

    <div class="card" style="padding: 0; overflow: hidden;">
      <div style="width:100%; aspect-ratio:16/9; background:#1a1a1a;">
        <iframe
  id="gameFrame"
  src="game/index.html"
  title="OpsAware Simulador"
  allowfullscreen
  style="width:100%; height:100%; border:none;">
</iframe>
      </div>
    </div>
  </div>

  <script src="videojuego.js"></script>
</body>
</html>
