<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8"/>
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>OpsAware — Videojuego</title>
  <link rel="preconnect" href="https://fonts.googleapis.com"/>
  <link href="https://fonts.googleapis.com/css2?family=VT323&family=Rajdhani:wght@400;500;600;700&display=swap" rel="stylesheet"/>
  <link rel="stylesheet" href="dashboard.css"/>
  <link rel="stylesheet" href="videojuego.css"/>
</head>
<body>

  <div class="scanlines"></div>

  <nav class="nav">
    <div class="nav-left">
      <a href="dashboard.html" class="nav-brand">
        <div class="nav-logo">
          <img src="logorockwell.png" alt="Logo">
        </div>
        <span class="nav-title">OpsAware</span>
      </a>
      <button class="btn-back" id="btnBack">← Volver al Dashboard</button>
    </div>
    <div class="nav-right">
      <div class="nav-user">
        <div class="nav-user-name" id="nombreUsuario">Cargando...</div>
        <div class="nav-user-sub">NIVEL 5 · 2500 XP</div>
      </div>
      <button class="btn-logout" id="btnLogout">Cerrar sesión</button>
    </div>
  </nav>

  <div class="vj-content">

    <!-- Header del juego -->
    <div class="vj-header">


      <div class="vj-header-left">
        <div class="vj-tag">▸ SIMULACIÓN EN CURSO</div>
        <div class="vj-title">WAREHOUSE DEFENSE</div>
        <div class="vj-sub">Protege el warehouse y neutraliza las amenazas entrantes</div>
      </div>

      <div class="vj-header-right">
        <div class="vj-info-box">
          <div class="vj-info-label">ESTADO</div>
          <div class="vj-info-val vj-status">
            <span class="vj-dot"></span>
            ONLINE
          </div>
        </div>
        <div class="vj-info-box alt">
          <div class="vj-info-label">SESIÓN</div>
          <div class="vj-info-val" id="vjSession">LIVE</div>
        </div>
      </div>
    </div>

    <!-- Monitor / Terminal -->
    <div class="vj-monitor">
      <div class="vj-monitor-top" id="monitorTop">
        <div class="vj-led r"></div>
        <div class="vj-led y"></div>
        <div class="vj-led g"></div>
        <div class="vj-monitor-label">OPSAWARE — <span>ACTIVE</span></div>
        <button class="btn-fullscreen" id="btnFullscreen" title="Pantalla completa">⛶ PANTALLA COMPLETA</button>
        <div class="vj-monitor-code" id="vjDateTime">// Cargando...</div>
      </div>

      <div class="vj-frame-wrap">

        <iframe
          id="gameFrame"
          src="game/index.html"
          title="OpsAware Simulador"
          allowfullscreen>
        </iframe>
      </div>
    </div>

  </div>

  <script src="videojuego.js"></script>
</body>
</html>
